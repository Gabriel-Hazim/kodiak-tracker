<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kodiak Biomechanical Lab Pro v3 🦾</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #070708; color: #f4f4f5; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    
    h1 { font-size: 1.3rem; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 0 0 10px rgba(0,255,204,0.3); text-align: center; }
    
    #canvas-container { position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3; background: #111113; border-radius: 12px; overflow: hidden; border: 2px solid #27272a; }
    video { display: none; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    
    .btn-container { width: 100%; max-width: 640px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin: 10px 0; }
    button, .file-label { padding: 12px; background: #18181b; border: 1px solid #3f3f46; border-radius: 8px; color: white; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.2s; }
    button:active, .file-label:active { transform: scale(0.98); }
    #btn-record.recording { background: #dc2626; color: white; animation: pulse 1.5s infinite; }
    
    input[type="file"] { display: none; }

    .panel { width: 100%; max-width: 640px; background: #111113; border-radius: 12px; padding: 12px; border: 1px solid #27272a; margin-bottom: 10px; }
    .section-title { font-size: 0.75rem; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; border-bottom: 1px solid #27272a; padding-bottom: 4px; }
    
    .joint-learning-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .joint-status { background: #18181b; padding: 6px; border-radius: 6px; text-align: center; border: 1px solid #27272a; }
    .joint-name { font-size: 0.65rem; color: #a1a1aa; font-weight: bold; }
    .joint-score { font-size: 0.9rem; font-weight: bold; }
    .status-good { color: #10b981; }
    .status-bad { color: #ef4444; }

    .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    input, select { padding: 10px; background: #070708; border: 1px solid #3f3f46; border-radius: 6px; color: white; font-size: 0.85rem; width: 100%; }
    input:focus, select:focus { border-color: #00ffcc; outline: none; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <h1>Kodiak Biomechanical Lab Pro v3 🦾</h1>

  <div id="canvas-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div class="btn-container">
    <button id="btn-toggle-cam" onclick="toggleCamera()">🔄 Girar Cámara</button>
    <button id="btn-record" onclick="toggleRecording()">🔴 Grabar con Datos</button>
    
    <label class="file-label" for="video-upload">📂 Analizar Video Guardado
      <input type="file" id="video-upload" accept="video/*" onchange="cargarVideoAnalisis(event)">
    </label>
    
    <select id="select-ejercicio" onchange="actualizarCalculos()">
      <option value="armwrestling">Armwrestling (Torque/Codo)</option>
      <option value="streetlifting">Street Lifting (Potencia/Lastre)</option>
    </select>
  </div>

  <div class="panel">
    <div class="section-title">Diagnóstico de Visibilidad Operacional</div>
    <div class="joint-learning-grid">
      <div class="joint-status" id="track-hombro"><div class="joint-name">HOMBRO</div><div class="joint-score status-bad" id="score-hombro">0%</div></div>
      <div class="joint-status" id="track-codo"><div class="joint-name">CODO</div><div class="joint-score status-bad" id="score-codo">0%</div></div>
      <div class="joint-status" id="track-muñeca"><div class="joint-name">MUÑECA</div><div class="joint-score status-bad" id="score-muñeca">0%</div></div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">Variables Físicas Ajustables</div>
    <div class="grid-inputs">
      <div>
        <label style="font-size:0.7rem; color:#a1a1aa;">Peso del Lastre Levantado (kg)</label>
        <input type="number" id="peso" value="25" oninput="actualizarCalculos()">
      </div>
      <div>
        <label style="font-size:0.7rem; color:#a1a1aa;">Longitud de Palanca Antebrazo (m)</label>
        <input type="number" id="palanca" value="0.25" step="0.01" oninput="actualizarCalculos()">
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    
    let currentFacingMode = 'user'; 
    let isMirrored = true;
    let isUsingUploadedVideo = false;
    let localStream = null;
    
    let anguloActual = 0;
    let torqueActual = 0;
    let repesTeoricas = 0;
    let aguanteMaximo = 0;
    let potenciaActual = 0;

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    let prevY = null;
    let prevTime = performance.now();

    function actualizarCalculos() {
      const modo = document.getElementById('select-ejercicio').value;
      const pesoInput = parseFloat(document.getElementById('peso').value) || 0;
      const palancaInput = parseFloat(document.getElementById('palanca').value) || 0.25;

      // Cálculo de Torque Biomecánico Real
      let fuerza = pesoInput * 9.81;
      torqueActual = fuerza * palancaInput * Math.sin(anguloActual * Math.PI / 180);

      // Algoritmo e integraciones de Gabriel (Kodiak Formulas)
      let isoSecondsSim = (anguloActual > 35) ? (anguloActual / 8) : 2;
      repesTeoricas = isoSecondsSim / 3;

      let plusKg = (modo === 'streetlifting') ? 5 : 0;
      aguanteMaximo = (pesoInput * repesTeoricas * 0.0333) + pesoInput + plusKg;
    }

    function actualizarDiagnosticoAI(hombro, codo, muñeca) {
      const actualizarNodo = (idScore, idCard, landmark) => {
        const elScore = document.getElementById(idScore);
        const elCard = document.getElementById(idCard);
        if (!landmark) {
          elScore.innerText = "0%"; elScore.className = "joint-score status-bad"; return;
        }
        let score = Math.round(landmark.visibility * 100);
        elScore.innerText = score + "%";
        if (score > 75) {
          elScore.className = "joint-score status-good"; elCard.style.borderColor = "#10b981";
        } else {
          elScore.className = "joint-score status-bad"; elCard.style.borderColor = "#ef4444";
        }
      };
      actualizarNodo('score-hombro', 'track-hombro', hombro);
      actualizarNodo('score-codo', 'track-codo', codo);
      actualizarNodo('score-muñeca', 'track-muñeca', muñeca);
    }

    function onResults(results) {
      if (canvasElement.width !== videoElement.videoWidth) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Renderizado del feed original de video
      if (isMirrored) {
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
      }
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore();

      if (results.poseLandmarks) {
        const landmarks = results.poseLandmarks;
        let armIndex = (landmarks[13].visibility > landmarks[14].visibility) ? [11, 13, 15] : [12, 14, 16];
        
        const pHombro = landmarks[armIndex[0]];
        const pCodo = landmarks[armIndex[1]];
        const pMuñeca = landmarks[armIndex[2]];

        actualizarDiagnosticoAI(pHombro, pCodo, pMuñeca);

        if (pHombro && pCodo && pMuñeca) {
          // Geometría angular plana
          let v1 = { x: pHombro.x - pCodo.x, y: pHombro.y - pCodo.y };
          let v2 = { x: pMuñeca.x - pCodo.x, y: pMuñeca.y - pCodo.y };
          let dot = v1.x * v2.x + v1.y * v2.y;
          let mod1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
          let mod2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
          anguloActual = Math.acos(dot / (mod1 * mod2)) * (180 / Math.PI);

          // Velocidad y potencia cinética
          let currentTime = performance.now();
          let currentY = pMuñeca.y * canvasElement.height;
          if (prevY !== null) {
            let dy = Math.abs(currentY - prevY) / canvasElement.height;
            let dt = (currentTime - prevTime) / 1000;
            if (dt > 0 && dy > 0.002) {
              let velocidad = dy / dt;
              let pesoInput = parseFloat(document.getElementById('peso').value) || 0;
              potenciaActual = (pesoInput * 9.81) * velocidad * 1.5;
            }
          }
          prevY = currentY;
          prevTime = currentTime;

          actualizarCalculos();

          // Renderizado del esqueleto Cyberpunk
          const drawNode = (pt, color) => {
            let cx = pt.x * canvasElement.width; let cy = pt.y * canvasElement.height;
            if (isMirrored) cx = canvasElement.width - cx;
            canvasCtx.beginPath(); canvasCtx.arc(cx, cy, 8, 0, 2 * Math.PI);
            canvasCtx.fillStyle = color; canvasCtx.fill();
            canvasCtx.strokeStyle = '#ffffff'; canvasCtx.lineWidth = 2; canvasCtx.stroke();
          };

          const drawVector = (ptA, ptB) => {
            let ax = ptA.x * canvasElement.width; let ay = ptA.y * canvasElement.height;
            let bx = ptB.x * canvasElement.width; let by = ptB.y * canvasElement.height;
            if (isMirrored) { ax = canvasElement.width - ax; bx = canvasElement.width - bx; }
            canvasCtx.beginPath(); canvasCtx.moveTo(ax, ay); canvasCtx.lineTo(bx, by);
            canvasCtx.strokeStyle = '#00ffcc'; canvasCtx.lineWidth = 4; canvasCtx.stroke();
          };

          drawVector(pHombro, pCodo);
          drawVector(pCodo, pMuñeca);
          drawNode(pHombro, '#18181b');
          drawNode(pCodo, '#d946ef');
          drawNode(pMuñeca, '#00ffcc');
        }
      }

      // LA MAGIA: Dibujar los datos matemáticos quemados dentro del propio Canvas (se guardarán en el video)
      renderizarMétricasEnCanvas();
    }

    function renderizarMétricasEnCanvas() {
      const modo = document.getElementById('select-ejercicio').value;
      
      canvasCtx.save();
      // Caja contenedora superior de datos
      canvasCtx.fillStyle = "rgba(12, 12, 14, 0.85)";
      canvasCtx.fillRect(10, 10, 240, 125);
      canvasCtx.strokeStyle = "#00ffcc";
      canvasCtx.lineWidth = 1.5;
      canvasCtx.strokeRect(10, 10, 240, 125);

      // Renderizado del texto
      canvasCtx.font = "bold 13px 'Segoe UI', sans-serif";
      canvasCtx.fillStyle = "#a1a1aa";
      
      canvasCtx.fillText("METRICAS KODIAK EN TIEMPO REAL", 18, 28);
      
      canvasCtx.fillStyle = "#ffffff";
      canvasCtx.fillText(`ANGULO CODO: ${Math.round(anguloActual)}°`, 18, 52);
      
      if (modo === 'armwrestling') {
        canvasCtx.fillText(`TORQUE: ${torqueActual.toFixed(2)} Nm`, 18, 72);
      } else {
        canvasCtx.fillText(`POTENCIA: ${Math.round(potenciaActual)} W", 18, 72`);
      }
      
      canvasCtx.fillStyle = "#d946ef";
      canvasCtx.fillText(`REPES DINAMICAS: ${repesTeoricas.toFixed(2)}`, 18, 97);
      canvasCtx.fillText(`AGUANTE MAX ESTIMADO: ${aguanteMaximo.toFixed(1)} kg`, 18, 117);
      
      canvasCtx.restore();
    }

    function toggleRecording() {
      const btn = document.getElementById('btn-record');
      if (!isRecording) {
        recordedChunks = [];
        let stream = canvasElement.captureStream(30);
        let options = { mimeType: 'video/webm; codecs=vp9' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };

        mediaRecorder = new MediaRecorder(stream, options);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        mediaRecorder.onstop = () => {
          let blob = new Blob(recordedChunks, { type: 'video/webm' });
          let url = URL.createObjectURL(blob);
          let a = document.createElement('a');
          a.href = url;
          a.download = `Kodiak_Lab_Analysis_${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          window.URL.revokeObjectURL(url);
        };

        mediaRecorder.start();
        isRecording = true;
        btn.innerText = "⏹️ Parar y Descargar";
        btn.className = "recording";
      } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.innerText = "🔴 Grabar con Datos";
        btn.className = "";
      }
    }

    // Carga recursiva de videos guardados de tus levantamientos
    function cargarVideoAnalisis(event) {
      const file = event.target.files[0];
      if (file) {
        isUsingUploadedVideo = true;
        isMirrored = false; // Desactivar espejo para videos pregrabados externos
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
        
        const fileURL = URL.createObjectURL(file);
        videoElement.srcObject = null;
        videoElement.src = fileURL;
        videoElement.muted = true;
        videoElement.loop = true;
        videoElement.play();
        requestAnimationFrame(procesarFrame);
      }
    }

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);

    async function initCamera() {
      if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
      isUsingUploadedVideo = false;
      const constraints = { video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } } };
      try {
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.src = null;
        videoElement.srcObject = localStream;
        isMirrored = (currentFacingMode === 'user');
        videoElement.play();
        requestAnimationFrame(procesarFrame);
      } catch (err) { alert("Error de cámara: " + err.message); }
    }

    async function procesarFrame() {
      if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) { await pose.send({ image: videoElement }); }
      requestAnimationFrame(procesarFrame);
    }

    function toggleCamera() {
      if(isUsingUploadedVideo) { initCamera(); return; }
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      initCamera();
    }

    window.onload = () => { initCamera(); actualizarCalculos(); };
  </script>
</body>
</html>
